<!DOCTYPE html>
<html>
<head>
    <title>Aplikasi Flask</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <h1 class="text-center">Selamat Datang di Aplikasi Flask!</h1>

    <div class="card p-4 mt-4 bg-secondary">
        <form method="POST">
            <input type="text" name="nama" class="form-control mb-2" placeholder="Nama" required>
            <textarea name="pesan" class="form-control mb-2" placeholder="Pesan" required></textarea>
            <button class="btn btn-primary">Kirim</button>
        </form>
    </div>

    <div class="mt-4">
        <h4>Data Masuk:</h4>

        {% for item in data %}
        <div class="card p-2 mt-2 bg-light text-dark">
            <b>{{ item.nama }}</b>
            <p>{{ item.pesan }}</p>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
